<style>
:root {
  --ink: #14140F;
  --ink-soft: #22221b;
  --ivory: #FAF6EC;
  --ivory-dim: #F1EBDC;
  --gold: #C9A227;
  --gold-soft: #e4c463;
  --sage: #6B1226;
  --line: rgba(201,162,39,0.35);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  background: var(--ivory);
  color: var(--ink);
  font-family: 'Jost', sans-serif;
  font-weight: 300;
  -webkit-font-smoothing: antialiased;
}
h1,h2,h3,.serif { font-family: 'Cormorant Garamond', serif; font-weight: 500; letter-spacing: 0.01em; }
a { color: inherit; text-decoration: none; }
img { max-width: 100%; display: block; }

/* divider */
.divider {
  display: flex; align-items: center; justify-content: center; gap: 14px;
  margin: 8px 0 36px; color: var(--gold);
}
.divider::before, .divider::after { content: ""; height: 1px; width: 60px; background: var(--line); }
.divider .mark { font-size: 14px; transform: translateY(-1px); }

/* header */
header {
  position: sticky; top: 0; z-index: 50;
  background: rgba(20,20,15,0.92);
  backdrop-filter: blur(6px);
  color: var(--ivory);
  border-bottom: 1px solid var(--line);
}
.nav-wrap {
  max-width: 1200px; margin: 0 auto; padding: 16px 24px;
  display: flex; align-items: center; justify-content: space-between; gap: 20px;
}
.logo {
  font-family: 'Cormorant Garamond', serif; font-size: 26px; letter-spacing: 0.04em;
  display: flex; align-items: center; gap: 8px;
}
.logo .mark { color: var(--gold); }
nav.links { display: flex; gap: 26px; flex-wrap: wrap; font-size: 14px; letter-spacing: 0.03em; }
nav.links a { opacity: 0.85; transition: opacity .2s, color .2s; padding-bottom: 2px; border-bottom: 1px solid transparent; cursor: pointer; }
nav.links a:hover { opacity: 1; color: var(--gold-soft); border-color: var(--gold-soft); }
.nav-icons { display: flex; align-items: center; gap: 18px; }
.cart-btn { position: relative; cursor: pointer; font-size: 14px; letter-spacing: 0.03em; display: flex; align-items: center; gap: 6px; }
.cart-count {
  background: var(--gold); color: var(--ink); font-size: 11px; font-weight: 600;
  border-radius: 50%; width: 18px; height: 18px; display: flex; align-items: center; justify-content: center;
}
.menu-toggle { display: none; background: none; border: none; color: var(--ivory); font-size: 22px; cursor: pointer; }

@media (max-width: 900px) {
  nav.links { display: none; }
  .menu-toggle { display: block; }
  nav.links.open {
    display: flex; flex-direction: column; position: absolute; top: 64px; left: 0; right: 0;
    background: var(--ink); padding: 20px 24px; gap: 16px; border-bottom: 1px solid var(--line);
  }
}

/* hero */
.hero {
  background: radial-gradient(circle at 20% 20%, rgba(201,162,39,0.10), transparent 45%),
    radial-gradient(circle at 80% 80%, rgba(62,86,65,0.18), transparent 50%), var(--ink);
  color: var(--ivory);
  padding: 110px 24px 90px;
  text-align: center;
  position: relative;
  overflow: hidden;
}
.hero .eyebrow { letter-spacing: 0.28em; text-transform: uppercase; font-size: 12px; color: var(--gold-soft); margin-bottom: 18px; }
.hero h1 { font-size: clamp(38px, 6vw, 74px); line-height: 1.05; max-width: 820px; margin: 0 auto 22px; }
.hero h1 em { font-style: italic; color: var(--gold-soft); }
.hero p.sub { max-width: 520px; margin: 0 auto 34px; font-size: 17px; line-height: 1.7; opacity: 0.82; font-weight: 300; }
.btn-row { display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; }
.btn {
  display: inline-block; padding: 14px 34px; font-size: 13px; letter-spacing: 0.12em; text-transform: uppercase;
  cursor: pointer; transition: all .25s ease; border: 1px solid var(--gold);
}
.btn-primary { background: var(--gold); color: var(--ink); }
.btn-primary:hover { background: var(--gold-soft); }
.btn-outline { background: transparent; color: var(--ivory); border-color: rgba(250,246,236,0.4); }
.btn-outline:hover { border-color: var(--gold-soft); color: var(--gold-soft); }

/* section shell */
section.block { padding: 80px 24px; max-width: 1200px; margin: 0 auto; }
.block-head { text-align: center; margin-bottom: 6px; }
.block-head .kicker { letter-spacing: 0.25em; text-transform: uppercase; font-size: 12px; color: var(--sage); font-weight: 500; }
.block-head h2 { font-size: clamp(28px, 4vw, 42px); margin: 8px 0 4px; }

/* category grid */
.cat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(230px,1fr)); gap: 22px; }
.cat-card {
  position: relative; aspect-ratio: 4/5; overflow: hidden; background: var(--ink-soft);
  border: 1px solid var(--line); cursor: pointer;
}
.cat-card img { width: 100%; height: 100%; object-fit: cover; transition: transform .5s ease; opacity: 0.88; }
.cat-card:hover img { transform: scale(1.06); opacity: 1; }
.cat-card .cat-label {
  position: absolute; inset: auto 0 0 0; padding: 18px 16px;
  background: linear-gradient(to top, rgba(20,20,15,0.92), transparent); color: var(--ivory);
}
.cat-label .name { font-family: 'Cormorant Garamond', serif; font-size: 22px; }
.cat-label .count { font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--gold-soft); }

/* product grid */
.prod-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px,1fr)); gap: 28px; margin-top: 14px; }
.prod-card { background: var(--ivory); }
.prod-img {
  aspect-ratio: 1/1; background: var(--ivory-dim); overflow: hidden; border: 1px solid rgba(20,20,15,0.08);
  position: relative;
}
.prod-img img { width: 100%; height: 100%; object-fit: cover; }
.prod-img-tall {
  aspect-ratio: auto; height: 380px; display: flex; align-items: center; justify-content: center;
  background: var(--ivory-dim); border: 1px solid rgba(20,20,15,0.08); position: relative; overflow: hidden;
}
.prod-img-tall img { width: auto; height: 100%; object-fit: contain; }
.prod-info { padding: 16px 2px; }
.prod-info .p-name { font-family: 'Cormorant Garamond', serif; font-size: 19px; margin-bottom: 4px; }
.prod-info .p-price { font-size: 14px; color: var(--sage); font-weight: 500; margin-bottom: 12px; }
.add-cart {
  width: 100%; padding: 11px; background: var(--ink); color: var(--ivory); border: none;
  font-size: 12px; letter-spacing: 0.12em; text-transform: uppercase; cursor: pointer; transition: background .2s;
}
.add-cart:hover { background: var(--sage); }
.add-cart.added { background: var(--gold); color: var(--ink); }

/* alt background */
.alt-bg { background: var(--ivory-dim); }
.alt-bg-section { background: var(--ivory-dim); padding: 0; }

/* promo banner */
.promo-banner {
  background: var(--ink); color: var(--ivory); text-align: center; padding: 26px 24px; margin-bottom: 44px;
  border-top: 1px solid var(--line); border-bottom: 1px solid var(--line);
}
.promo-banner strong { color: var(--gold-soft); }
.promo-banner p { font-size: 14px; letter-spacing: 0.02em; }

/* faith strip */
.faith-strip { background: var(--sage); color: var(--ivory); text-align: center; padding: 70px 24px; }
.faith-strip .divider::before, .faith-strip .divider::after { background: rgba(250,246,236,0.3); }
.faith-strip .divider { color: var(--gold-soft); }
.faith-strip h2 { font-size: clamp(26px, 4vw, 38px); max-width: 640px; margin: 0 auto 14px; }
.faith-strip p { max-width: 560px; margin: 0 auto; opacity: 0.85; line-height: 1.7; font-size: 15px; }

/* about strip */
.about-strip { background: var(--ink); color: var(--ivory); text-align: center; padding: 60px 24px; }
.about-strip p { max-width: 620px; margin: 0 auto; opacity: 0.82; line-height: 1.8; font-size: 15px; }

/* footer */
footer { background: var(--ink); color: var(--ivory); padding: 60px 24px 30px; }
.foot-wrap {
  max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: 1.4fr 1fr 1fr 1fr; gap: 36px;
}
.foot-wrap h4 { font-size: 12px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--gold-soft); margin-bottom: 16px; }
.foot-wrap p, .foot-wrap a { font-size: 14px; opacity: 0.8; line-height: 2; display: block; }
.foot-wrap a:hover { opacity: 1; color: var(--gold-soft); }
.foot-bottom {
  max-width: 1200px; margin: 40px auto 0; padding-top: 24px; border-top: 1px solid rgba(250,246,236,0.12);
  text-align: center; font-size: 12px; opacity: 0.55;
}
@media (max-width: 800px) { .foot-wrap { grid-template-columns: 1fr 1fr; } }
@media (max-width: 500px) { .foot-wrap { grid-template-columns: 1fr; } }

/* floating whatsapp */
.wa-wrap { position: fixed; bottom: 26px; right: 26px; z-index: 100; }
.wa-btn {
  width: 60px; height: 60px; border-radius: 50%; background: #25D366; display: flex; align-items: center; justify-content: center;
  cursor: pointer; box-shadow: 0 8px 24px rgba(0,0,0,0.25); border: none;
}
.wa-btn svg { width: 30px; height: 30px; fill: #fff; }
.wa-menu {
  position: absolute; bottom: 72px; right: 0; background: var(--ivory); border: 1px solid var(--line);
  box-shadow: 0 12px 30px rgba(0,0,0,0.18); width: 230px; padding: 10px; display: none; flex-direction: column; gap: 8px;
}
.wa-menu.open { display: flex; }
.wa-menu a {
  display: flex; align-items: center; gap: 10px; padding: 10px 12px; font-size: 13px; background: var(--ivory-dim);
  transition: background .2s;
}
.wa-menu a:hover { background: #e5f6ea; }

/* cart drawer */
.overlay { position: fixed; inset: 0; background: rgba(20,20,15,0.5); z-index: 150; display: none; }
.overlay.open { display: block; }
.drawer {
  position: fixed; top: 0; right: -420px; width: 100%; max-width: 400px; height: 100%; background: var(--ivory);
  z-index: 160; transition: right .3s ease; display: flex; flex-direction: column;
}
.drawer.open { right: 0; }
.drawer-head {
  padding: 22px 24px; border-bottom: 1px solid var(--line); display: flex; justify-content: space-between; align-items: center;
}
.drawer-head h3 { font-size: 22px; }
.drawer-close { background: none; border: none; font-size: 22px; cursor: pointer; }
.drawer-body { flex: 1; overflow-y: auto; padding: 18px 24px; }
.drawer-item { display: flex; gap: 12px; padding: 14px 0; border-bottom: 1px solid rgba(20,20,15,0.08); }
.drawer-item img { width: 64px; height: 64px; object-fit: cover; }
.di-info { flex: 1; }
.di-info .name { font-size: 15px; margin-bottom: 2px; }
.di-info .price { font-size: 13px; color: var(--sage); }
.di-remove { background: none; border: none; font-size: 12px; text-decoration: underline; cursor: pointer; opacity: 0.6; padding: 0; margin-top: 6px; }
.drawer-empty { text-align: center; padding: 60px 20px; opacity: 0.6; font-size: 14px; }
.drawer-foot { padding: 20px 24px; border-top: 1px solid var(--line); }
.drawer-total { display: flex; justify-content: space-between; font-size: 16px; margin-bottom: 16px; font-family: 'Cormorant Garamond', serif; }
.pay-methods { display: flex; flex-direction: column; gap: 10px; }
.pay-btn {
  width: 100%; padding: 13px; border: none; font-size: 13px; letter-spacing: 0.08em; text-transform: uppercase; cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 8px;
}
.pay-paypal { background: #FFC439; color: #111; }
.pay-card { background: var(--ink); color: var(--ivory); }
.pay-eft { background: transparent; border: 1px solid var(--ink); color: var(--ink); }
.pay-note { font-size: 11px; opacity: 0.55; margin-top: 10px; line-height: 1.5; }

/* modal */
.modal-overlay { position: fixed; inset: 0; background: rgba(20,20,15,0.6); z-index: 200; display: none; align-items: center; justify-content: center; padding: 24px; }
.modal-overlay.open { display: flex; }
.modal-box { background: var(--ivory); max-width: 600px; width: 100%; max-height: 80vh; overflow-y: auto; padding: 34px; position: relative; }
.modal-box h3 { font-size: 26px; margin-bottom: 14px; }
.modal-box p { font-size: 14px; line-height: 1.8; margin-bottom: 12px; opacity: 0.85; }
.modal-close { position: absolute; top: 18px; right: 20px; background: none; border: none; font-size: 22px; cursor: pointer; }
.foot-legal { display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; margin-top: 10px; }
.foot-legal span { font-size: 12px; opacity: 0.6; cursor: pointer; text-decoration: underline; }
.foot-legal span:hover { opacity: 0.9; }

/* contact form */
.contact-section { background: var(--ink); color: var(--ivory); padding: 80px 24px; }
.contact-inner { max-width: 560px; margin: 0 auto; text-align: center; }
.contact-inner h2 { font-size: clamp(26px,4vw,38px); margin-bottom: 8px; }
.contact-inner p { font-size: 14px; opacity: 0.75; margin-bottom: 32px; line-height: 1.7; }
.contact-form { display: flex; flex-direction: column; gap: 14px; text-align: left; }
.contact-form input, .contact-form textarea {
  width: 100%; padding: 13px 16px; background: rgba(255,255,255,0.07); border: 1px solid rgba(201,162,39,0.3);
  color: var(--ivory); font-family: 'Jost', sans-serif; font-size: 14px; outline: none;
}
.contact-form input::placeholder, .contact-form textarea::placeholder { opacity: 0.5; }
.contact-form textarea { min-height: 120px; resize: vertical; }
.contact-form button { align-self: flex-start; }
.form-success { background: rgba(201,162,39,0.15); border: 1px solid var(--gold); padding: 16px; font-size: 14px; line-height: 1.6; }
.form-error { background: rgba(107,18,38,0.2); border: 1px solid var(--sage); padding: 16px; font-size: 14px; }

::selection { background: var(--gold-soft); color: var(--ink); }

/* ---- admin panel ---- */
.admin-gear {
  background: none; border: 1px solid var(--line); color: var(--gold-soft);
  width: 34px; height: 34px; border-radius: 50%; font-size: 16px; cursor: pointer;
  margin-right: 6px; opacity: 0.55; transition: opacity 0.2s;
}
.admin-gear:hover { opacity: 1; }
.admin-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 999;
  display: flex; align-items: center; justify-content: center; padding: 16px;
}
.admin-login, .admin-panel {
  background: #14140F; border: 1px solid var(--line); border-radius: 12px;
  padding: 24px; width: 100%; max-width: 480px; max-height: 85vh; overflow-y: auto;
  color: #F1EBDC;
}
.admin-login h3, .admin-panel-head h3 { margin-bottom: 16px; color: var(--gold-soft); }
.admin-login input, .admin-item input {
  width: 100%; padding: 10px 12px; margin-bottom: 10px; border-radius: 6px;
  border: 1px solid var(--line); background: #1c1c15; color: #F1EBDC; font-size: 15px;
}
.admin-error { color: #e08a8a; margin-bottom: 10px; font-size: 13px; }
.admin-login-btns { display: flex; gap: 10px; }
.admin-panel-head { display: flex; justify-content: space-between; align-items: center; }
.admin-close { background: none; border: none; color: #F1EBDC; font-size: 20px; cursor: pointer; }
.admin-hint { font-size: 13px; opacity: 0.7; margin-bottom: 16px; }
.admin-cat { border-top: 1px solid var(--line); }
.admin-cat-head {
  display: flex; justify-content: space-between; padding: 14px 4px; cursor: pointer;
  text-transform: capitalize; font-weight: 600;
}
.admin-cat-body { padding-bottom: 14px; }
.admin-item {
  display: flex; gap: 12px; padding: 12px 4px; border-top: 1px dashed var(--line);
}
.admin-thumb { width: 64px; height: 64px; object-fit: cover; border-radius: 6px; flex-shrink: 0; }
.admin-fields { flex: 1; }
.admin-fields label { font-size: 11px; opacity: 0.6; display: block; margin-bottom: 2px; }
.admin-save-btn { padding: 8px 16px; font-size: 13px; margin-top: 4px; }
</style>
</head>

<script>
  function showFatalError(msg) {
    var box = document.getElementById('fatal-error');
    box.style.display = 'block';
    box.textContent = 'Something broke while loading the site:\n\n' + msg + '\n\nPlease screenshot this and send it back.';
  }
  window.addEventListener('error', function (e) {
    showFatalError((e.message || 'Unknown error') + '\n(file: ' + e.filename + ' line ' + e.lineno + ')');
  });
  window.addEventListener('unhandledrejection', function (e) {
    showFatalError('Promise error: ' + (e.reason && e.reason.message ? e.reason.message : e.reason));
  });
</script>

function CartDrawer({ open, cart, onClose, onRemove }) {
  const total = cart.reduce((s, i) => s + i.price * i.qty, 0)

  function handleCheckout(method) {
    if (cart.length === 0) return
    if (method === 'whatsapp') {
      const lines = cart.map(i => `• ${i.name} x${i.qty} — ${fmt(i.price * i.qty)}`).join('%0A')
      const msg = `Hello ChristianCore Co! I would like to place an order:%0A${lines}%0A%0ATotal: ${fmt(total)}`
      window.open(`https://wa.me/27748238307?text=${msg}`, '_blank')
    } else if (method === 'eft') {
      alert('EFT details will be sent to your email. Please contact us on WhatsApp to confirm your order.')
    } else {
      alert('Card payment coming soon! Please use WhatsApp or EFT for now.')
    }
  }

  return (
    <>
      <div className={`overlay${open ? ' open' : ''}`} onClick={onClose} />
      <div className={`drawer${open ? ' open' : ''}`}>
        <div className="drawer-head">
          <h3>Your Cart</h3>
          <button className="drawer-close" onClick={onClose}>✕</button>
        </div>

          {cart.length === 0
            ? <div className="drawer-empty">Your cart is empty — start shopping above.</div>
            : cart.map(item => (
              <div className="drawer-item" key={item.id}>
                <img src={item.img} alt={item.name} />
                <div className="di-info">
                  <div className="name">{item.name}</div>
                  <div className="price">{fmt(item.price)} × {item.qty}</div>
                  <button className="di-remove" onClick={() => onRemove(item.id)}>Remove</button>
                </div>
              </div>
            ))
          }
        </div>
        {cart.length > 0 && (
          <div className="drawer-foot">
            <div className="drawer-total">
              <span>Total</span>
              <span>{fmt(total)}</span>
            </div>
            <div className="pay-methods">
              <button className="pay-btn pay-paypal" onClick={() => handleCheckout('paypal')}>
                💳 Pay with Card / PayPal

              <button className="pay-btn pay-card" onClick={() => handleCheckout('whatsapp')}>

}

// ── Contact Form ──────────────────────────────────────────────────────────────
function ContactForm() {
  const [form, setForm] = useState({ name: '', email: '', message: '' })
  const [status, setStatus] = useState(null) // null | 'sending' | 'success' | 'error'

  // ⚠️ REPLACE THIS with your real email address before publishing.
  // The first message you receive after publishing will contain a one-time
  // confirmation link from FormSubmit — click it once to activate the form.
  const CONTACT_EMAIL = 'Christiancore757@gmail.com'

  async function handleSubmit(e) {
    e.preventDefault()
    setStatus('sending')
    try {
      const res = await fetch(`https://formsubmit.co/ajax/${CONTACT_EMAIL}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', Accept: 'application/json' },
        body: JSON.stringify({
          Name: form.name,
          Email: form.email,
          Message: form.message,
          _subject: 'New message from ChristianCore Co website'
        })
      })
      if (res.ok) {
        setStatus('success')
        setForm({ name: '', email: '', message: '' })
      } else {
        setStatus('error')
      }
    } catch {
      setStatus('error')
    }
  }

  return (
    <div className="contact-section" id="contact">
      <div className="contact-inner">
        <h2>Get in Touch</h2>
        <p>Questions about an order, a custom gift, or just want to say hello? We would love to hear from you. We are based in Durban and reply within 24 hours.</p>
        {status === 'success' ? (
          <div className="form-success">
            ✓ Thanks — your message has been sent! We will get back to you via email or WhatsApp shortly.
          </div>
        ) : (
          <form className="contact-form" onSubmit={handleSubmit}>
            <input
              type="text" placeholder="Your name" required
              value={form.name} onChange={e => setForm(f => ({ ...f, name: e.target.value }))}
            />
            <input
              type="email" placeholder="Email address" required
              value={form.email} onChange={e => setForm(f => ({ ...f, email: e.target.value }))}
            />
            <textarea
              placeholder="Your message..."
              value={form.message} onChange={e => setForm(f => ({ ...f, message: e.target.value }))}
              required
            />
            {status === 'error' && (
              <div className="form-error">Something went wrong, please try again.</div>
            )}
            <button type="submit" className="btn btn-primary" disabled={status === 'sending'}>
              {status === 'sending' ? 'Sending…' : 'Send Message'}
            </button>
          </form>
        )}
      </div>
    </div>
  )
}

// ── Admin Panel ───────────────────────────────────────────────────────────────
function AdminPanel({ products, setProducts, isAdmin, setIsAdmin, onClose }) {
  const [pwInput, setPwInput] = useState('')
  const [pwError, setPwError] = useState(false)
  const [savingId, setSavingId] = useState(null)
  const [savedId, setSavedId] = useState(null)
  const [openCat, setOpenCat] = useState(null)

  function checkPassword(e) {
    e.preventDefault()
    if (pwInput === ADMIN_PASSWORD) {
      setIsAdmin(true)
      setPwError(false)
    } else {
      setPwError(true)
    }
  }

  function updateField(cat, id, field, value) {
    setProducts(prev => {
      const next = JSON.parse(JSON.stringify(prev))
      const item = next[cat].find(p => p.id === id)
      if (item) item[field] = value
      return next
    })
  }

  function handleImageChange(cat, id, file) {
    if (!file) return
    const reader = new FileReader()
    reader.onload = () => {
      const img = new Image()
      img.onload = () => {
        // Resize down so it stays small enough for the free database plan
        const maxW = 800
        const scale = Math.min(1, maxW / img.width)
        const canvas = document.createElement('canvas')
        canvas.width = img.width * scale
        canvas.height = img.height * scale
        const ctx = canvas.getContext('2d')
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height)
        const dataUrl = canvas.toDataURL('image/jpeg', 0.72)
        updateField(cat, id, 'img', dataUrl)
      }
      img.src = reader.result
    }
    reader.readAsDataURL(file)
  }

  async function saveProduct(cat, id) {
    const item = products[cat].find(p => p.id === id)
    if (!item) return
    if (!db) {
      alert('The shared database is not connected right now — changes will not save for other visitors.')
      return
    }
    setSavingId(id)
    try {
      await db.collection('products').doc(id).set({
        name: item.name,
        price: item.price,
        img: item.img,
        adminSecret: ADMIN_PASSWORD
      })
      setSavedId(id)
      setTimeout(() => setSavedId(null), 1500)
    } catch (err) {
      alert('Could not save — check your internet connection and try again.')
      console.error(err)
    }
    setSavingId(null)
  }

  if (!isAdmin) {
    return (
      <div className="admin-overlay" onClick={onClose}>
        <div className="admin-login" onClick={e => e.stopPropagation()}>
          <h3>Admin Login</h3>
          <form onSubmit={checkPassword}>
            <input
              type="password"
              placeholder="Enter admin password"
              value={pwInput}
              onChange={e => setPwInput(e.target.value)}
              autoFocus
            />
            {pwError && <p className="admin-error">Wrong password — try again.</p>}
            <div className="admin-login-btns">
              <button type="submit" className="btn btn-primary">Enter</button>
              <button type="button" className="btn btn-outline" onClick={onClose}>Cancel</button>
            </div>
          </form>
        </div>
      </div>
    )
  }

  return (
    <div className="admin-overlay">
      <div className="admin-panel">
        <div className="admin-panel-head">
          <h3>Edit Website</h3>
          <button className="admin-close" onClick={onClose}>✕</button>
        </div>
        <p className="admin-hint">Changes save live for every visitor. Tap a category to expand it.</p>
        {Object.keys(products).map(cat => (
          <div className="admin-cat" key={cat}>
            <div className="admin-cat-head" onClick={() => setOpenCat(openCat === cat ? null : cat)}>
              {cat} <span>{openCat === cat ? '−' : '+'}</span>
            </div>
            {openCat === cat && (
              <div className="admin-cat-body">
                {products[cat].map(item => (
                  <div className="admin-item" key={item.id}>
                    <img src={item.img} alt={item.name} className="admin-thumb" />
                    <div className="admin-fields">
                      <label>Name</label>
                      <input
                        type="text"
                        value={item.name}
                        onChange={e => updateField(cat, item.id, 'name', e.target.value)}
                      />
                      <label>Price (R)</label>
                      <input
                        type="number"
                        value={item.price}
                        onChange={e => updateField(cat, item.id, 'price', Number(e.target.value))}
                      />
                      <label>Photo</label>
                      <input
                        type="file"
                        accept="image/*"
                        onChange={e => handleImageChange(cat, item.id, e.target.files[0])}
                      />
                      <button
                        className="btn btn-primary admin-save-btn"
                        onClick={() => saveProduct(cat, item.id)}
                        disabled={savingId === item.id}
                      >
                        {savingId === item.id ? 'Saving…' : savedId === item.id ? 'Saved ✓' : 'Save'}
                      </button>
                    </div>
                  </div>
                ))}
              </div>
            )}
          </div>
        ))}
      </div>
    </div>
  )
}

function App() {
  const [cart, setCart] = useState([])
  const [cartOpen, setCartOpen] = useState(false)
  const [addedId, setAddedId] = useState(null)
  const [navOpen, setNavOpen] = useState(false)
  const [modal, setModal] = useState(null)
  const [products, setProducts] = useState(() => JSON.parse(JSON.stringify(PRODUCTS)))
  const [isAdmin, setIsAdmin] = useState(false)
  const [adminOpen, setAdminOpen] = useState(false)

  // Load any saved edits from the shared database so every visitor sees them
  useEffect(() => {
    if (!db) return
    db.collection('products').get().then(snap => {
      setProducts(prev => {
        const next = JSON.parse(JSON.stringify(prev))
        snap.forEach(doc => {
          const data = doc.data()
          Object.keys(next).forEach(cat => {
            const idx = next[cat].findIndex(p => p.id === doc.id)
            if (idx !== -1) next[cat][idx] = { ...next[cat][idx], ...data }
          })
        })
        return next
      })
    }).catch(err => console.error('Could not load saved edits:', err))
  }, [])

  const totalItems = cart.reduce((s, i) => s + i.qty, 0)

  function addToCart(product) {
    setCart(prev => {
      const existing = prev.find(i => i.id === product.id)
      if (existing) return prev.map(i => i.id === product.id ? { ...i, qty: i.qty + 1 } : i)
      return [...prev, { ...product, qty: 1 }]
    })
    setAddedId(product.id)
    setTimeout(() => setAddedId(null), 1500)
  }

  function removeFromCart(id) {
    setCart(prev => prev.filter(i => i.id !== id))
  }

  const navLinks = [
    { id: 'chains', label: 'Chains' },
    { id: 'bracelets', label: 'Bracelets & Watches' },
